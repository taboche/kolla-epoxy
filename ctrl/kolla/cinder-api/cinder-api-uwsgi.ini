[uwsgi]
add-header = Connection: close
buffer-size = 65535
die-on-term = true
enable-threads = true
exit-on-reload = false
hook-master-start = unix_signal:15 gracefully_kill_them_all
http = 192.168.3.10:8776
lazy-apps = true
logto2 = /var/log/kolla/cinder/cinder-api-uwsgi.log
logfile-chmod = 644
master = true
module = cinder.wsgi.api:application
plugins-dir = /usr/lib/uwsgi/plugins
plugins = python3
processes = 5
thunder-lock = true
uid = cinder
worker-reload-mercy = 80
