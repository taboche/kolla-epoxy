frontend horizon_front
    mode http
    http-request del-header X-Forwarded-Proto
    use_backend acme_client_back if { path_reg ^/.well-known/acme-challenge/.+ }
    option httplog
    option forwardfor
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    bind 192.168.3.14:443 ssl crt /etc/haproxy/certificates/haproxy-internal.pem alpn h2,http/1.1
    default_backend horizon_back

backend horizon_back
    mode http
    balance roundrobin
    option httpchk
    server infra1 192.168.3.10:80 check inter 2000 rise 2 fall 5  
    server infra2 192.168.3.11:80 check inter 2000 rise 2 fall 5  
    server infra3 192.168.3.12:80 check inter 2000 rise 2 fall 5  

frontend horizon_redirect_front
    mode http
    bind 192.168.3.14:80
    redirect scheme https code 301 if !{ ssl_fc } !{ path_reg ^/.well-known/acme-challenge/.+ }
    use_backend acme_client_back if { path_reg ^/.well-known/acme-challenge/.+ }

frontend horizon_external_front
    mode http
    http-request deny if { path -i -m beg /server-status }
    http-request del-header X-Forwarded-Proto
    use_backend acme_client_back if { path_reg ^/.well-known/acme-challenge/.+ }
    option httplog
    option forwardfor
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    bind 192.168.3.13:443 ssl crt /etc/haproxy/certificates/haproxy.pem alpn h2,http/1.1
    default_backend horizon_external_back

backend horizon_external_back
    mode http
    balance roundrobin
    option httpchk
    server infra1 192.168.3.10:80 check inter 2000 rise 2 fall 5  
    server infra2 192.168.3.11:80 check inter 2000 rise 2 fall 5  
    server infra3 192.168.3.12:80 check inter 2000 rise 2 fall 5  

frontend horizon_external_redirect_front
    mode http
    bind 192.168.3.13:80
    redirect scheme https code 301 if !{ ssl_fc } !{ path_reg ^/.well-known/acme-challenge/.+ }
    use_backend acme_client_back if { path_reg ^/.well-known/acme-challenge/.+ }

backend acme_client_back
    mode http

