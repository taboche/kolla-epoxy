frontend nova_metadata_front
    mode http
    http-request del-header X-Forwarded-Proto
    option httplog
    option forwardfor
    http-request set-header X-Forwarded-Proto https if { ssl_fc }
    bind 192.168.3.14:8775 ssl crt /etc/haproxy/certificates/haproxy-internal.pem alpn h2,http/1.1
    default_backend nova_metadata_back

backend nova_metadata_back
    mode http
    option httpchk
    server infra1 192.168.3.10:8775 check inter 2000 rise 2 fall 5  
    server infra2 192.168.3.11:8775 check inter 2000 rise 2 fall 5  
    server infra3 192.168.3.12:8775 check inter 2000 rise 2 fall 5  

